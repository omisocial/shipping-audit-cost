function t(k){return(LANG[S.lang]||LANG.vi)[k]||k}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(n){return(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtAmt(n){return S.currency+fmt(n)}
function fmtDate(d){try{return new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'})}catch{return String(d)}}
function currentPeriod(){const d=new Date();return String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()}
function fillTpl(tpl,data){return tpl.replace(/\{(\w+)\}/g,(_,k)=>data[k]!=null?data[k]:'{'+k+'}')}
function calcStats(results){
  let dc=0,co=0,bo=0,mc=0,coAmt=0,boAmt=0,td=0;
  (results||[]).forEach(r=>{
    if(r.status==='carrier_over'){dc++;co++;coAmt+=r.d_total;}
    else if(r.status==='boxme_over'){dc++;bo++;boAmt+=Math.abs(r.d_total);}
    else if(r.status==='missing'){mc++;}
    td+=r.d_total||0;
  });
  return{discrepancyCount:dc,carrierOverCount:co,boxmeOverCount:bo,missingCount:mc,carrierOverAmount:coAmt,boxmeOverAmount:boAmt,totalDiff:td};
}
function guessCountry(key,tpl){
  const k=key.toUpperCase(),nm=((tpl&&tpl.name)||'').toUpperCase();
  if(k.endsWith('_VN')||nm.includes('(VN)')||['GHN','GHTK','VTP'].some(x=>k.startsWith(x)))return'VN';
  if(k.endsWith('_PH')||nm.includes('(PH)')||k.includes('GRAB'))return'PH';
  return'TH';
}
function getTemplateData(){
  const{results}=S.results||{results:[]};
  const stats=calcStats(results);
  return{
    carrier:S.carrier?(S.carrier.name||S.carrierKey):'',
    period:S.period||'',
    totalRows:results.length,
    matched:S.results?S.results.matched:0,
    discrepancyCount:stats.discrepancyCount,
    carrierOverCount:stats.carrierOverCount,
    boxmeOverCount:stats.boxmeOverCount,
    missingCount:stats.missingCount,
    carrierOverAmount:fmtAmt(stats.carrierOverAmount),
    boxmeOverAmount:fmtAmt(stats.boxmeOverAmount),
    totalDiff:fmtAmt(stats.totalDiff),
  };
}

async function loadTemplates(){
  try{
    const r=await fetch('templates.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();delete j._meta;S.templates=j;
  }catch(e){
    toast(t('errorLoadTemplates'),'error');
    console.error(e);
  }
}
function parseWb(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=e=>{try{res(XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true,raw:false}))}catch(err){rej(err)}};
    fr.onerror=rej;
    fr.readAsArrayBuffer(file);
  });
}
function sheetData(wb,name,headerRow){
  const ws=wb.Sheets[name];if(!ws)return{headers:[],data:[]};
  const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  const hi=(headerRow||1)-1;
  const headers=(raw[hi]||[]).map(h=>String(h||'').trim()).filter(h=>h);
  const data=[];
  for(let i=hi+1;i<raw.length;i++){
    const row=raw[i];
    if(!row.some(v=>v!==''))continue;
    const obj={};headers.forEach((h,j)=>{obj[h]=row[j]!==undefined?row[j]:''});
    data.push(obj);
  }
  return{headers,data};
}
function autoSheet(wb,hints){
  const sheets=wb.SheetNames;
  if(!hints||!hints.length)return sheets[0];
  // Tier 1: exact match
  for(const h of hints){const f=sheets.find(s=>s.toLowerCase()===h.toLowerCase());if(f)return f;}
  // Tier 2: startsWith
  for(const h of hints){const f=sheets.find(s=>s.toLowerCase().startsWith(h.toLowerCase()));if(f)return f;}
  // Tier 3: includes (substring)
  for(const h of hints){const f=sheets.find(s=>s.toLowerCase().includes(h.toLowerCase()));if(f)return f;}
  return sheets[0];
}
async function loadFile(file,type){
  try{
    const wb=await parseWb(file);
    const c=S.carrier||{};
    if(type==='carrier'){
      S.carrierFile=file;S.carrierWb=wb;
      S.carrierSheet=autoSheet(wb,c.carrierSheetHint);
      const{headers,data}=sheetData(wb,S.carrierSheet,c.headerRowHint||1);
      S.carrierHeaders=headers;S.carrierData=data;
    }else{
      S.boxmeFile=file;S.boxmeWb=wb;
      S.boxmeSheet=autoSheet(wb,c.boxmeSheetHint||['Order']);
      const{headers,data}=sheetData(wb,S.boxmeSheet,1);
      S.boxmeHeaders=headers;S.boxmeData=data;
    }
    render();
  }catch(e){toast(t('errorParseFile')+': '+e.message,'error');}
}
function handleDrop(ev,type){
  ev.preventDefault();
  document.getElementById(type+'-zone').classList.remove('drag-over');
  const f=ev.dataTransfer.files[0];if(f)loadFile(f,type);
}
function handleFile(ev,type){const f=ev.target.files[0];if(f)loadFile(f,type);}
function onSheetChange(type,sheet){
  if(type==='carrier'){
    S.carrierSheet=sheet;
    const{headers,data}=sheetData(S.carrierWb,sheet,(S.carrier&&S.carrier.headerRowHint)||1);
    S.carrierHeaders=headers;S.carrierData=data;
  }else{
    S.boxmeSheet=sheet;
    const{headers,data}=sheetData(S.boxmeWb,sheet,1);
    S.boxmeHeaders=headers;S.boxmeData=data;
  }
  render();
}

const GLOBAL_HINTS={
  tracking:['tracking','tracking number','waybill','consignment','awb','เลขพัสดุ','mã vận đơn'],
  bm_number:['order','order id','รหัสออเดอร์','mã đơn','reference'],
  shipping_fee:['shipping','freight','ค่าขนส่ง','phí vận chuyển','cước'],
  cod_fee:['cod','cash on delivery','เก็บเงินปลายทาง','tiền thu hộ','money collect'],
  overweight_fee:['overweight','excess weight','น้ำหนักเกิน','vượt cân'],
  remote_fee:['remote','area surcharge','ห่างไกล','vùng xa'],
  insurance_fee:['insurance','ประกัน','bảo hiểm'],
  return_fee:['return','คืน','hoàn'],
  other_fees:['other','misc','phí khác','ค่าอื่น'],
  weight:['weight','น้ำหนัก','trọng lượng','kg'],
  status:['status','สถานะ','trạng thái'],
};
function readMappingFromUI(){
  const fields=['tracking','bm_number','shipping_fee','cod_fee','overweight_fee','remote_fee','insurance_fee','return_fee','other_fees','weight','status'];
  fields.forEach(f=>{
    const ce=document.getElementById('cm_'+f),be=document.getElementById('bm_'+f);
    if(ce)S.carrierMap[f]=ce.value||undefined;
    if(be)S.boxmeMap[f]=be.value||undefined;
  });
}
function goToStep3(){
  if(!S.carrierFile||!S.boxmeFile)return;
  const c=S.carrier||{};
  const cHints=AuditCore.mergeHints(GLOBAL_HINTS,c.carrierHints||{});
  const bHints=AuditCore.mergeHints(GLOBAL_HINTS,c.boxmeHints||{});
  const learned=loadLearnedMap(S.carrierKey);
  if(learned){
    S.carrierMap={...AuditCore.smartDetect(S.carrierHeaders,cHints,c.carrierMapping||{}),...learned.carrier};
    S.boxmeMap={...AuditCore.smartDetect(S.boxmeHeaders,bHints,c.boxmeMapping||{}),...learned.boxme};
    S.learnedCarrier=true;S.learnedBoxme=true;
  }else{
    S.carrierMap=AuditCore.smartDetect(S.carrierHeaders,cHints,c.carrierMapping||{});
    S.boxmeMap=AuditCore.smartDetect(S.boxmeHeaders,bHints,c.boxmeMapping||{});
    S.learnedCarrier=false;S.learnedBoxme=false;
  }
  S.step=3;render();
}
function doReconcile(){
  readMappingFromUI();
  if(!S.carrierMap.tracking){toast(t('errorNoTracking'),'error');return;}
  const btn=document.getElementById('reconcile-btn');
  if(btn){btn.disabled=true;btn.innerHTML=t('loading');}
  setTimeout(()=>{
    try{
      S.results=AuditCore.reconcile(S.carrierData,S.boxmeData,S.carrierMap,S.boxmeMap,parseFloat(S.tolFee)||0.01);
      // Detect seller/customer column from BMS headers
      const sellerHints=['seller','customer','shop','merchant','seller_id','seller_code','mã kh','khách hàng','ลูกค้า','buyer','client','shipper'];
      S.sellerField=S.boxmeHeaders.find(h=>{const hl=h.toLowerCase();return sellerHints.some(hint=>hl.includes(hint));})||null;
      // Enrich result rows with seller info
      if(S.sellerField){
        const bmIdx={};
        S.boxmeData.forEach(row=>{
          const trk=String(row[S.boxmeMap.tracking]||row[S.boxmeMap.bm_number]||'').trim();
          if(trk)bmIdx[trk]=row;
        });
        S.results.results.forEach(r=>{
          const bmRow=bmIdx[r.tracking]||bmIdx[r.bm_number]||null;
          r.seller=bmRow?String(bmRow[S.sellerField]||'').trim():'';
        });
      }
      saveLearnedMap(S.carrierKey,S.carrierMap,S.boxmeMap);
      toast(t('mappingSaved'),'success');
      const stats=calcStats(S.results.results);
      saveHistory({id:Date.now(),date:new Date().toISOString(),carrierKey:S.carrierKey,
        carrierName:S.carrier?(S.carrier.name||S.carrierKey):S.carrierKey,
        period:S.period,totalRows:S.results.results.length,matched:S.results.matched,
        missing:S.results.missing,...stats,currency:S.currency});
      S.step=4;S.resultsTab='all';
      setTimeout(()=>toast(t('reconcileSuccess'),'success'),100);
    }catch(e){toast(t('errorReconcile')+': '+e.message,'error');}
    render();
  },80);
}

/* ── Audit Workflow ── */
function renderAudit(){
  const steps=[t('step1Label'),t('step2Label'),t('step3Label'),t('step4Label')];
  const nav=steps.map((lbl,i)=>{
    const n=i+1,cls=n===S.step?'active':n<S.step?'done':'',lc=n<S.step?'done':'';
    return`<div class="step-item"><div class="step-circle ${cls}">${n<S.step?'✓':n}</div><span class="step-lbl ${cls}">${esc(lbl)}</span></div>${n<steps.length?`<div class="step-line ${lc}"></div>`:''}`;
  }).join('');
  let content='';
  if(S.step===1)content=renderStep1();
  else if(S.step===2)content=renderStep2();
  else if(S.step===3)content=renderStep3();
  else if(S.step===4)content=renderStep4();
  return`<div class="step-nav">${nav}</div>${content}`;
}

    <div class="mb-4">

function cpText(id){

/* ============================================================
   PART 11 — EXCEL EXPORT
   ============================================================ */
function generateExcel(filter='all'){
  const{results}=S.results;
  const stats=calcStats(results);
  const carrier=S.carrier?(S.carrier.name||S.carrierKey):'Unknown';
  const period=S.period||'Unknown';
  const sLabels={ok:t('statusOk'),carrier_over:t('statusCarrierOver'),boxme_over:t('statusBoxmeOver'),missing:t('statusMissing')};
  const wb=XLSX.utils.book_new();
  // Sheet 1: Summary
  const sum=[
    [t('reportTitle')],[''],
    [t('carrier')+':',carrier,t('period')+':',period],
    [t('generatedAt')+':',new Date().toLocaleString()],[''],
    [t('totalProcessed'),results.length],
    [t('matched'),S.results.matched],
    [t('discrepancies'),stats.discrepancyCount],
    [t('carrierOver'),stats.carrierOverCount,t('amount'),stats.carrierOverAmount],
    [t('boxmeOver'),stats.boxmeOverCount,t('amount'),stats.boxmeOverAmount],
    [t('missing'),stats.missingCount],
    [t('totalDiff'),stats.totalDiff],
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),t('sheetSummary'));
  // Detail header (with optional seller column)
  const selHdr=S.sellerField?[t('seller')]:[];
  const hdr=['#',t('tracking'),t('bmNumber'),...selHdr,
    t('c_shipping_fee'),t('c_cod_fee'),t('c_overweight_fee'),t('c_remote_fee'),t('c_insurance_fee'),t('c_return_fee'),t('c_other_fees'),t('c_total'),
    t('b_shipping_fee'),t('b_cod_fee'),t('b_overweight_fee'),t('b_remote_fee'),t('b_insurance_fee'),t('b_return_fee'),t('b_other_fees'),t('b_total'),
    t('d_shipping_fee'),t('d_overweight_fee'),t('d_remote_fee'),t('d_other_fees'),t('d_total'),
    t('status')];
  function buildRows(rows){
    return rows.map((r,i)=>{
      const base=AuditCore.buildExportRow(r,i,sLabels);
      // Insert seller after col index 2 (tracking, bmNumber)
      if(S.sellerField)base.splice(2,0,r.seller||'');
      return base;
    });
  }
  function addSheet(rows,name){XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...buildRows(rows)]),name);}
  // Determine which sheets to include based on filter
  if(filter==='all'){
    addSheet(results.filter(r=>r.status!=='ok'),t('sheetDiscrepancies'));
    addSheet(results.filter(r=>r.status==='carrier_over'),t('sheetCarrierOver'));
    addSheet(results.filter(r=>r.status==='boxme_over'),t('sheetBoxmeOver'));
    addSheet(results.filter(r=>r.status==='missing'),t('sheetMissing'));
    addSheet(results,t('sheetAll'));
  }else if(filter==='discrepancy'){
    addSheet(results.filter(r=>r.status!=='ok'),t('sheetDiscrepancies'));
  }else if(filter==='carrier_over'){
    addSheet(results.filter(r=>r.status==='carrier_over'),t('sheetCarrierOver'));
  }else if(filter==='boxme_over'){
    addSheet(results.filter(r=>r.status==='boxme_over'),t('sheetBoxmeOver'));
  }
  const suffix=filter==='all'?'':('_'+filter);
  XLSX.writeFile(wb,`Boxme_Audit_${carrier.replace(/\s+/g,'_')}_${period.replace('/','_')}${suffix}_${Date.now()}.xlsx`);
  toast(t('downloadStarted'),'success');
}
function generateExcelByCustomer(filter='all'){
  if(!S.sellerField){toast(t('noSellerColumn'),'error');return;}
  const{results}=S.results;
  const carrier=S.carrier?(S.carrier.name||S.carrierKey):'Unknown';
  const period=S.period||'Unknown';
  const sLabels={ok:t('statusOk'),carrier_over:t('statusCarrierOver'),boxme_over:t('statusBoxmeOver'),missing:t('statusMissing')};
  // Filter rows by status filter
  let filtered=results;
  if(filter==='discrepancy')filtered=results.filter(r=>r.status!=='ok');
  else if(filter==='carrier_over')filtered=results.filter(r=>r.status==='carrier_over');
  else if(filter==='boxme_over')filtered=results.filter(r=>r.status==='boxme_over');
  // Group by seller
  const groups={};
  filtered.forEach(r=>{const s=r.seller||'(unknown)';if(!groups[s])groups[s]=[];groups[s].push(r);});
  const sellers=Object.keys(groups).sort();
  if(!sellers.length){toast(t('noSellerColumn'),'error');return;}
  const selHdr=[t('seller')];
  const hdr=['#',t('tracking'),t('bmNumber'),...selHdr,
    t('c_shipping_fee'),t('c_cod_fee'),t('c_overweight_fee'),t('c_remote_fee'),t('c_insurance_fee'),t('c_return_fee'),t('c_other_fees'),t('c_total'),
    t('b_shipping_fee'),t('b_cod_fee'),t('b_overweight_fee'),t('b_remote_fee'),t('b_insurance_fee'),t('b_return_fee'),t('b_other_fees'),t('b_total'),
    t('d_shipping_fee'),t('d_overweight_fee'),t('d_remote_fee'),t('d_other_fees'),t('d_total'),
    t('status')];
  function buildRows(rows){
    return rows.map((r,i)=>{const base=AuditCore.buildExportRow(r,i,sLabels);base.splice(2,0,r.seller||'');return base;});
  }
  const wb=XLSX.utils.book_new();
  // Summary sheet: list of sellers with their stats
  const sumHdr=[t('seller'),t('totalProcessed'),t('discrepancies'),t('carrierOver'),t('amount'),t('boxmeOver'),t('amount'),t('missing'),t('totalDiff')];
  const sumRows=sellers.map(s=>{
    const st=calcStats(groups[s]);
    return[s,groups[s].length,st.discrepancyCount,st.carrierOverCount,st.carrierOverAmount,st.boxmeOverCount,st.boxmeOverAmount,st.missingCount,st.totalDiff];
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([sumHdr,...sumRows]),t('sheetSummary'));
  // One sheet per seller (truncate name to 28 chars for Excel limit)
  sellers.forEach(s=>{
    const sheetName=s.slice(0,28).replace(/[:\\/?*[\]]/g,'_');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([hdr,...buildRows(groups[s])]),sheetName);
  });
  const suffix=filter==='all'?'':('_'+filter);
  XLSX.writeFile(wb,`Boxme_ByCustomer_${carrier.replace(/\s+/g,'_')}_${period.replace('/','_')}${suffix}_${Date.now()}.xlsx`);
  toast(t('downloadStarted'),'success');
}

function pickCarrier(key){
  S.carrierKey=key;
  S.carrier=S.templates[key];
  if(!S.period)S.period=currentPeriod();
  const guessed=guessCountry(key,S.carrier);
  S.country=guessed;
  S.currency=COUNTRY_CURRENCY[guessed]||'฿';
  S.step=2;render();
}
function addCustom(){
  const n=(document.getElementById('custom-name').value||'').trim();
  if(!n)return;
  S.carrierKey=n.toUpperCase();
  S.carrier={name:n,carrierMapping:{},boxmeMapping:{},carrierHints:{}};
  S.currency='฿';
  if(!S.period)S.period=currentPeriod();
  S.step=2;render();
}
function filterCarriers(q){
  const ql=q.toLowerCase();
  document.querySelectorAll('.carrier-card').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(ql)?'':'none';
  });
}
function clearHistory(){
  if(!confirm(t('confirmClearHistory')))return;
  S.history=[];localStorage.removeItem('ba_history');render();
}
function exportTpl(){
  const b=new Blob([JSON.stringify(S.templates,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='carrier_templates_'+Date.now()+'.json';a.click();
}
function importTpl(ev){
  const f=ev.target.files[0];if(!f)return;
  const fr=new FileReader();
  fr.onload=e=>{try{const j=JSON.parse(e.target.result);delete j._meta;S.templates={...S.templates,...j};toast(t('templatesImported'),'success');render();}catch{toast(t('errorParseFile'),'error');}};
  fr.readAsText(f);
}

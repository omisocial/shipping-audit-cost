<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boxme Micro Tools — Login</title>
<link rel="stylesheet" href="shared/design-system.css">
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">BX</div>
      <div class="login-title" id="login-title">Micro Tools</div>
      <div class="login-subtitle" id="login-subtitle">Đăng nhập để tiếp tục</div>
    </div>
    <div class="login-body">
      <div class="login-error" id="login-error">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="login-error-text">Sai tài khoản hoặc mật khẩu</span>
      </div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="label" for="username" id="lbl-username">Tên đăng nhập</label>
          <input class="input" type="text" id="username" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label class="label" for="password" id="lbl-password">Mật khẩu</label>
          <input class="input" type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="btn-login" style="margin-top:8px">
          Đăng nhập
        </button>
      </form>
    </div>
    <div class="login-footer">
      <div class="lang-sw" style="display:inline-flex;margin-bottom:8px">
        <button class="lang-btn active" onclick="setLang('vi')" id="lang-vi">🇻🇳 VI</button>
        <button class="lang-btn" onclick="setLang('en')" id="lang-en">🌐 EN</button>
        <button class="lang-btn" onclick="setLang('th')" id="lang-th">🇹🇭 TH</button>
      </div>
      <div class="login-footer-text">Boxme Micro Tools v1.0</div>
    </div>
  </div>
</div>

<script src="shared/auth.js"></script>
<script>
// Redirect if already logged in
if (MicroAuth.isAuthenticated()) {
  window.location.replace('portal.html');
}

// i18n
const LANG_LOGIN = {
  vi: {
    title: 'Micro Tools',
    subtitle: 'Đăng nhập để tiếp tục',
    username: 'Tên đăng nhập',
    password: 'Mật khẩu',
    login: 'Đăng nhập',
    error: 'Sai tài khoản hoặc mật khẩu',
  },
  en: {
    title: 'Micro Tools',
    subtitle: 'Sign in to continue',
    username: 'Username',
    password: 'Password',
    login: 'Sign In',
    error: 'Invalid username or password',
  },
  th: {
    title: 'Micro Tools',
    subtitle: 'เข้าสู่ระบบเพื่อดำเนินการต่อ',
    username: 'ชื่อผู้ใช้',
    password: 'รหัสผ่าน',
    login: 'เข้าสู่ระบบ',
    error: 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง',
  }
};

let currentLang = localStorage.getItem('micro_tools_lang') || 'vi';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('micro_tools_lang', lang);
  applyLang();
}

function applyLang() {
  const t = LANG_LOGIN[currentLang] || LANG_LOGIN.vi;
  document.getElementById('login-title').textContent = t.title;
  document.getElementById('login-subtitle').textContent = t.subtitle;
  document.getElementById('lbl-username').textContent = t.username;
  document.getElementById('lbl-password').textContent = t.password;
  document.getElementById('btn-login').textContent = t.login;
  document.getElementById('login-error-text').textContent = t.error;

  // Update active lang button
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  const activeBtn = document.getElementById('lang-' + currentLang);
  if (activeBtn) activeBtn.classList.add('active');
}

function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (MicroAuth.validateCredentials(username, password)) {
    MicroAuth.setSession();
    window.location.replace('portal.html');
  } else {
    const errEl = document.getElementById('login-error');
    errEl.classList.add('show');
    // Shake animation
    errEl.style.animation = 'none';
    errEl.offsetHeight; // reflow
    errEl.style.animation = 'shake .4s ease';
  }
}

// Init
applyLang();
</script>

<style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-6px); }
  40%,80% { transform: translateX(6px); }
}
</style>
</body>
</html>
